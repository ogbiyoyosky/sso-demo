# lua-resty-session (v3.x) config, read from these $session_* nginx variables and
# included into Kong's proxy server block via KONG_NGINX_PROXY_INCLUDE.
#
# Redis-backed session storage: sessions are encrypted and stored in Redis, with a
# session ID in the cookie. This allows session sharing across Kong instances and
# survives Kong restarts (unlike cookie-only storage).
set $session_secret demo4-kong-oidc-session-secret-change-me;

set $session_storage redis;
set $session_redis_host redis;
set $session_redis_port 6379;
set $session_redis_database 0;
set $session_redis_timeout 1000;
set $session_redis_pool_size 30;

set $session_cookie_secure off;     # plain http on localhost; flip to on behind TLS
set $session_cookie_httponly on;
set $session_cookie_samesite Lax;   # rides the top-level redirect back from Keycloak
