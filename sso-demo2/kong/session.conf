# lua-resty-session (v3.x) configuration, read from these $session_* nginx
# variables. Included into Kong's PROXY server block via KONG_NGINX_PROXY_INCLUDE
# (see docker-compose.yml). The kong-oidc plugin runs in the access phase of
# THIS server block, so the variables are in scope when it creates a session.
#
# `set` is valid in the server context (which is why we include here, not in the
# http block). Each directive below maps to a lua-resty-session default.

# Store session DATA in Redis instead of encrypting it all into the cookie.
# The cookie then holds only the session id; the payload (tokens, userinfo)
# lives in Redis — shareable across Kong replicas. THIS is the "sticky"/shared
# session the project is about.
set $session_storage redis;

# Connection to the redis service on the compose network.
set $session_redis_host redis;
set $session_redis_port 6379;

# Namespace keys so Redis stays legible: keys look like  oidc:<sessionid>
set $session_redis_prefix oidc;

# Single-node Redis here, so per-request locking just adds latency. Turn it off.
set $session_redis_uselocking off;

# Cookie hardening. NOTE secure=off because this demo is plain http on
# localhost; flip to on behind TLS in production.
set $session_cookie_secure off;
set $session_cookie_httponly on;
# `lax` lets the cookie ride the top-level redirect back from Keycloak.
set $session_cookie_samesite Lax;
