# =============================================================================
# sso-demo2 — OIDC at the GATEWAY (Kong) instead of in each app.
# =============================================================================
#
# This stack moves authentication OUT of the application code and UP into an
# API gateway. The apps behind Kong contain ZERO OIDC code — they just read a
# header Kong injects. Compare with ../sso-demo, where each backend was itself
# the OIDC client.
#
#   Browser
#     │   http://app-one.localhost:8000   http://app-two.localhost:8000
#     ▼
#  ┌──────────────────────── Kong Gateway (:8000) ────────────────────────┐
#  │  kong-oidc plugin  ── confidential OIDC client of Keycloak             │
#  │    • no session cookie? → redirect browser to Keycloak login          │
#  │    • on return: exchange code, store session in REDIS                  │
#  │    • inject  X-Userinfo: <base64 JSON {email, name, roles, ...}>       │
#  └───────┬───────────────────────────────┬───────────────────────────────┘
#          │ (authenticated, header set)    │
#          ▼                                ▼
#   frontend1 / frontend2 (static)   backend1 / backend2 (Express, role-aware)
#
#          ▲ server-to-server (discovery, token, userinfo, jwks)
#          │
#     Keycloak (:8080) ── identity broker ──► Microsoft Entra ID (cloud)
#       • realm "demo", users persisted to POSTGRES
#       • "Login with Microsoft"  → in-house users  → role: employee
#       • "Register / email+password" → outside users → role: customer
#          │
#          ▼
#     Postgres (:5432)  ← every user (brokered AND self-registered) lives here
#
#     Redis (:6379)  ← Kong's OIDC sessions ("sticky"/shared across Kong nodes)
#
# WHY REDIS = "sticky session": if you scaled Kong to N replicas behind a load
# balancer, a user's session must be findable no matter which Kong node a
# request lands on. A cookie-only (in-memory) session is pinned to one node;
# a Redis-backed session is shared, so the load balancer is free to send any
# request to any node and the session still resolves. That shared store is what
# makes horizontal scaling ("sticky" without true stickiness) possible.
#
# THE ISSUER/HOSTNAME PITFALL (read §4 of the README before debugging iss errors):
# Keycloak is pinned to KC_HOSTNAME=localhost so every token says
# iss=http://localhost:8080/realms/demo. The browser reaches it there directly.
# Kong, inside the compose network, also reaches it at localhost:8080 because we
# give Kong `extra_hosts: localhost:host-gateway` — its `localhost` resolves to
# the host machine, where port 8080 is published. One issuer string everywhere.
# (Entra also REQUIRES the broker redirect URI to be http://localhost/... — plain
# http is only allowed by Entra for the literal host "localhost".)
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Postgres — the single source of truth for ALL users.
  # Keycloak persists both Entra-brokered and self-registered accounts here.
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-keycloak}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - sso

  # ---------------------------------------------------------------------------
  # Redis — Kong's OIDC session store (see the "sticky session" note above).
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    # appendonly keeps sessions across a redis restart — nice for a demo so a
    # `docker compose restart redis` doesn't log everyone out.
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - sso

  # ---------------------------------------------------------------------------
  # Keycloak — OpenID Provider + identity broker, backed by Postgres.
  # ---------------------------------------------------------------------------
  keycloak:
    image: quay.io/keycloak/keycloak:26.2
    command: start-dev --import-realm
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}

      # Persist to Postgres instead of the throwaway in-memory H2 DB. THIS is
      # what "save all users in a postgres db" means in this stack.
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-keycloak}

      # Pin the issuer hostname (see the header comment + README §4).
      KC_HOSTNAME: localhost
      KC_HTTP_ENABLED: "true"
      KC_HEALTH_ENABLED: "true"

      # Substituted into keycloak/realm-export.json during import so the secrets
      # never live in the JSON.
      ENTRA_TENANT_ID: ${ENTRA_TENANT_ID}
      ENTRA_CLIENT_ID: ${ENTRA_CLIENT_ID}
      ENTRA_CLIENT_SECRET: ${ENTRA_CLIENT_SECRET}
      KONG_APP_ONE_SECRET: ${KONG_APP_ONE_SECRET:-change-me-kong-app-one}
      KONG_APP_TWO_SECRET: ${KONG_APP_TWO_SECRET:-change-me-kong-app-two}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # The Keycloak image ships no curl/wget; talk to the management port (9000)
      # with bash's /dev/tcp and grep the readiness JSON.
      test:
        - CMD-SHELL
        - |
          exec 3<>/dev/tcp/127.0.0.1/9000
          echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
          grep -m 1 '"status": "UP"' <&3
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 40s
    networks:
      - sso

  # ---------------------------------------------------------------------------
  # Kong — DB-less (declarative) gateway with the community kong-oidc plugin.
  # All browser traffic enters here on :8000.
  # ---------------------------------------------------------------------------
  kong:
    build: ./kong
    environment:
      KONG_DATABASE: "off"
      KONG_DECLARATIVE_CONFIG: /kong/kong.yml

      # Load our custom plugin alongside Kong's bundled ones.
      KONG_PLUGINS: bundled,oidc

      # The kong-oidc plugin stores sessions via lua-resty-session, which reads
      # these $session_* nginx variables. We inject them into the proxy server
      # block (where the plugin's access phase runs) by including a snippet.
      # See kong/session.conf and README §3.
      KONG_NGINX_PROXY_INCLUDE: /kong/session.conf

      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: info
    extra_hosts:
      # Make Kong's `localhost` resolve to the host machine, where Keycloak's
      # 8080 is published — so server-to-server OIDC calls hit the SAME issuer
      # (http://localhost:8080) the browser and tokens use. See README §4.
      - "localhost:host-gateway"
    ports:
      - "8000:8000"   # proxy (browser traffic)
      - "8001:8001"   # admin API (inspect config: curl localhost:8001)
    volumes:
      - ./kong/kong.yml:/kong/kong.yml:ro
      - ./kong/session.conf:/kong/session.conf:ro
    depends_on:
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Use the NUMERIC loopback, not the name "localhost" — we remapped that
      # name to host-gateway above, so `kong health` (which probes 127.0.0.1)
      # is the safe check.
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks:
      - sso

  # ---------------------------------------------------------------------------
  # App One — "Customer Portal": open to any authenticated user.
  # ---------------------------------------------------------------------------
  backend1:
    build: ./backend
    environment:
      APP_NAME: Customer Portal
      # App One does not require a specific role — any logged-in user may enter.
      REQUIRED_ROLE: ""
      HOME_URL: http://app-one.localhost:8000/
    networks:
      - sso

  frontend1:
    build:
      context: ./frontend
      args:
        APP_NAME: Customer Portal
        APP_TAGLINE: Open to employees and registered customers
        ACCENT: "#2563eb"
    networks:
      - sso

  # ---------------------------------------------------------------------------
  # App Two — "Internal Tools": EMPLOYEES ONLY (must hold the `employee` role,
  # which only Entra-brokered in-house users get). Customers are 403'd by the
  # backend — a demonstration of role-based access on top of SSO.
  # ---------------------------------------------------------------------------
  backend2:
    build: ./backend
    environment:
      APP_NAME: Internal Tools
      REQUIRED_ROLE: employee
      HOME_URL: http://app-two.localhost:8000/
    networks:
      - sso

  frontend2:
    build:
      context: ./frontend
      args:
        APP_NAME: Internal Tools
        APP_TAGLINE: Employees only (Microsoft Entra ID sign-in)
        ACCENT: "#059669"
    networks:
      - sso

networks:
  sso:
    driver: bridge

volumes:
  pgdata:
  redisdata:
