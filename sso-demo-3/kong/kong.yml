# Kong declarative (DB-less) config for sso-demo-3 (Kong + OIDC plugin variant).
#
# THE SPLIT OF RESPONSIBILITIES (this is the whole point of demo 3):
#   • Kong's `oidc` plugin does AUTHENTICATION only — it runs the OIDC code flow
#     against Keycloak, keeps the session in Redis, and injects an `X-Userinfo`
#     header (base64 JSON incl. the user's roles) into the upstream request.
#   • The upstream for BOTH apps is the `auth-service`, which does AUTHORIZATION:
#     it reads X-Userinfo, applies its central POLICY table (App Two = employees
#     only), and on "allow" reverse-proxies to the real frontend/backend.
#   So Kong answers "are you logged in?" and the auth-service answers "may you?".
#
# preserve_host: true is REQUIRED — the auth-service decides policy and upstream
# by the ORIGINAL Host (app-one/app-two), and openidc builds the redirect_uri
# from that host + redirect_uri_path, so Kong must forward the real Host.
#
# CONFIG NOTES (this kong-oidc version):
#   • the callback is a PATH (redirect_uri_path), not a full URL; openidc builds
#     http://<host>/oauth2/callback from it — which matches the redirect URI
#     already registered on the Keycloak `auth-service` client (so no realm change).
#   • the session secret comes from $session_secret in session.conf (not here).
#   • client_secret is the demo default Keycloak imported (AUTH_SERVICE_SECRET);
#     Kong reuses that existing Keycloak client as its OIDC client.

_format_version: "3.0"

services:
  - name: apps
    url: http://auth-service:4000
    routes:
      - name: app-one
        hosts: ["app-one.localhost"]
        paths: ["/"]
        preserve_host: true
        plugins:
          - name: oidc
            config:
              client_id: auth-service
              client_secret: change-me-auth-service
              # The issuer the BROWSER uses and the tokens carry. Kong does NOT
              # fetch this URL — see internal_host below and utils.get_options.
              discovery: "http://localhost:8080/realms/demo/.well-known/openid-configuration"
              # Host Kong uses for SERVER-SIDE calls (token/jwks/userinfo), since
              # it can't reach Keycloak at localhost. Browser-facing URLs keep
              # localhost so the redirect works and the id_token `iss` matches.
              internal_host: "keycloak:8080"
              redirect_uri_path: "/oauth2/callback"
              scope: "openid profile email"
              token_endpoint_auth_method: "client_secret_post"
              ssl_verify: "no"
              logout_path: "/oauth2/logout"
              # Clears the Kong session, then sends the browser to Keycloak's
              # end-session endpoint (client_id + post_logout_redirect_uri so
              # Keycloak validates the return URL against this client).
              redirect_after_logout_uri: "http://localhost:8080/realms/demo/protocol/openid-connect/logout?client_id=auth-service&post_logout_redirect_uri=http://app-one.localhost/"

      - name: app-two
        hosts: ["app-two.localhost"]
        paths: ["/"]
        preserve_host: true
        plugins:
          - name: oidc
            config:
              client_id: auth-service
              client_secret: change-me-auth-service
              discovery: "http://localhost:8080/realms/demo/.well-known/openid-configuration"
              internal_host: "keycloak:8080"
              redirect_uri_path: "/oauth2/callback"
              scope: "openid profile email"
              token_endpoint_auth_method: "client_secret_post"
              ssl_verify: "no"
              logout_path: "/oauth2/logout"
              redirect_after_logout_uri: "http://localhost:8080/realms/demo/protocol/openid-connect/logout?client_id=auth-service&post_logout_redirect_uri=http://app-two.localhost/"
