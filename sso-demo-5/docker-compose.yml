# =============================================================================
# sso-demo-5 — Kong OIDC gateway stack.
#
# Provider selection via OIDC_PROVIDER in .env:
#   keycloak (dev/staging): OIDC_PROVIDER=keycloak  COMPOSE_PROFILES=keycloak
#   entra    (production):  OIDC_PROVIDER=entra      COMPOSE_PROFILES=
#
# With COMPOSE_PROFILES=keycloak, Postgres + Keycloak start automatically.
# With COMPOSE_PROFILES empty, only Kong + Redis + frontend + backend start.
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Postgres — Keycloak persistence (keycloak profile only)
  # ---------------------------------------------------------------------------
  postgres:
    profiles: [keycloak]
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak} -d ${POSTGRES_DB:-keycloak}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [sso]

  # ---------------------------------------------------------------------------
  # Keycloak — OIDC provider for dev/staging (keycloak profile only)
  # ---------------------------------------------------------------------------
  keycloak:
    profiles: [keycloak]
    build: ./keycloak
    command: start --import-realm --optimized
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HTTP_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      KONG_CLIENT_SECRET: ${KONG_CLIENT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - |
          exec 3<>/dev/tcp/127.0.0.1/9000
          echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
          grep -m 1 '"status": "UP"' <&3
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 60s
    networks: [sso]

  # ---------------------------------------------------------------------------
  # Redis — OIDC session storage (always started)
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [sso]

  # ---------------------------------------------------------------------------
  # Kong — OIDC gateway (always started)
  # ---------------------------------------------------------------------------
  kong:
    build: ./kong
    environment:
      KONG_DATABASE: "off"
      KONG_PLUGINS: bundled,oidc
      KONG_PLUGINSERVER_NAMES: js
      KONG_PLUGINSERVER_JS_SOCKET: /usr/local/kong/js_pluginserver.sock
      KONG_PLUGINSERVER_JS_START_CMD: /usr/bin/kong-js-pluginserver -d /usr/local/kong/plugins -p /usr/local/kong --sock-name js_pluginserver.sock
      KONG_PLUGINSERVER_JS_QUERY_CMD: /usr/bin/kong-js-pluginserver -d /usr/local/kong/plugins --dump-all-plugins
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: ${KONG_LOG_LEVEL:-info}
      # Provider flag — drives entrypoint.sh logic
      OIDC_PROVIDER: ${OIDC_PROVIDER:-keycloak}
      # Keycloak-specific vars (used when OIDC_PROVIDER=keycloak)
      KONG_CLIENT_SECRET: ${KONG_CLIENT_SECRET:-}
      KC_URL: ${KC_URL:-http://localhost:8080}
      KC_REALM: ${KC_REALM:-demo}
      KC_INTERNAL_HOST: ${KC_INTERNAL_HOST:-keycloak:8080}
      # Entra-specific vars (used when OIDC_PROVIDER=entra)
      AZURE_TENANT_ID: ${AZURE_TENANT_ID:-}
      AZURE_CLIENT_ID: ${AZURE_CLIENT_ID:-}
      AZURE_CLIENT_SECRET: ${AZURE_CLIENT_SECRET:-}
      # Shared
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml.template:/kong/kong.yml.template:ro
    depends_on:
      redis:
        condition: service_healthy
      keycloak:
        condition: service_healthy
        required: false   # not present when OIDC_PROVIDER=entra
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [sso]

  # ---------------------------------------------------------------------------
  # Backend + Frontend (always started)
  # ---------------------------------------------------------------------------
  backend:
    build: ./backend
    environment:
      APP_NAME: ${BACKEND_APP_NAME:-Demo 5 API}
    networks: [sso]

  frontend:
    build:
      context: ./frontend
      args:
        APP_NAME: ${FRONTEND_APP_NAME:-Demo 5}
        APP_TAGLINE: ${FRONTEND_TAGLINE:-Keycloak + Kong, JS PDK OIDC plugin}
        ACCENT: ${FRONTEND_ACCENT:-#8b5cf6}
    networks: [sso]

networks:
  sso:
    driver: bridge

volumes:
  postgres_data:
