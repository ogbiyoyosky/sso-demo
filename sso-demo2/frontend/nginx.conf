server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;

  # Single self-contained page: serve it for any path that isn't a real file.
  # (In normal flow Kong intercepts /cb and /logout before they reach here, but
  # this keeps the page rendering for any leftover path the gateway passes on.)
  location / {
    try_files $uri /index.html;
  }
}
