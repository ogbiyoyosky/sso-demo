# Custom login theme. We inherit from keycloak.v2 so any page we DON'T override
# (error, reset-password, OTP, terms, …) still renders with a working default.
# Our login.ftl and register.ftl are fully standalone HTML, so they don't depend
# on the parent's template macros at all.
parent=keycloak.v2
import=common/keycloak

# A11y/i18n stays on; our pages mostly hardcode copy for clarity.
locales=en
