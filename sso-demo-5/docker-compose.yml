# =============================================================================
# sso-demo-5 — Kong + OIDC stack with JavaScript PDK plugin.
#   Keycloak (OP) + Kong (gateway, OIDC plugin = authN) + frontend + backend
#   + Redis (sessions) + Postgres (Keycloak persistence).
#
# All environment-specific values come from .env (copy .env.example to start).
# =============================================================================

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-keycloak}
      POSTGRES_USER: ${POSTGRES_USER:-keycloak}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-keycloak} -d ${POSTGRES_DB:-keycloak}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [sso]

  keycloak:
    build: ./keycloak
    command: start --import-realm --optimized
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: ${KEYCLOAK_ADMIN:-admin}
      KC_BOOTSTRAP_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_HOSTNAME: ${KC_HOSTNAME:-localhost}
      KC_HTTP_ENABLED: "true"
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-keycloak}
      KC_DB_USERNAME: ${POSTGRES_USER:-keycloak}
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD}
      # Passed through so realm-export.json can use ${env.KONG_CLIENT_SECRET}
      # and ${env.APP_BASE_URL} for redirect URIs.
      KONG_CLIENT_SECRET: ${KONG_CLIENT_SECRET}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
    ports:
      - "8080:8080"
    volumes:
      - ./keycloak/realm-export.json:/opt/keycloak/data/import/realm-export.json:ro
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        - CMD-SHELL
        - |
          exec 3<>/dev/tcp/127.0.0.1/9000
          echo -e 'GET /health/ready HTTP/1.1\r\nHost: localhost\r\nConnection: close\r\n\r\n' >&3
          grep -m 1 '"status": "UP"' <&3
      interval: 5s
      timeout: 5s
      retries: 40
      start_period: 60s
    networks: [sso]

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [sso]

  kong:
    build: ./kong
    environment:
      KONG_DATABASE: "off"
      KONG_PLUGINS: bundled,oidc
      KONG_PLUGINSERVER_NAMES: js
      KONG_PLUGINSERVER_JS_SOCKET: /usr/local/kong/js_pluginserver.sock
      KONG_PLUGINSERVER_JS_START_CMD: /usr/bin/kong-js-pluginserver -d /usr/local/kong/plugins -p /usr/local/kong --sock-name js_pluginserver.sock
      KONG_PLUGINSERVER_JS_QUERY_CMD: /usr/bin/kong-js-pluginserver -d /usr/local/kong/plugins --dump-all-plugins
      KONG_PROXY_LISTEN: "0.0.0.0:8000"
      KONG_ADMIN_LISTEN: "0.0.0.0:8001"
      KONG_LOG_LEVEL: ${KONG_LOG_LEVEL:-info}
      # Vars consumed by entrypoint.sh → envsubst → kong.yml.template
      KONG_CLIENT_SECRET: ${KONG_CLIENT_SECRET}
      KC_URL: ${KC_URL:-http://localhost:8080}
      KC_REALM: ${KC_REALM:-demo}
      KC_INTERNAL_HOST: ${KC_INTERNAL_HOST:-keycloak:8080}
      APP_BASE_URL: ${APP_BASE_URL:-http://localhost:8000}
      # Vars consumed by the OIDC plugin at runtime
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
    ports:
      - "8000:8000"
      - "8001:8001"
    volumes:
      - ./kong/kong.yml.template:/kong/kong.yml.template:ro
    depends_on:
      keycloak:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 20s
    networks: [sso]

  backend:
    build: ./backend
    environment:
      APP_NAME: ${BACKEND_APP_NAME:-Demo 5 API}
    networks: [sso]

  frontend:
    build:
      context: ./frontend
      args:
        APP_NAME: ${FRONTEND_APP_NAME:-Demo 5}
        APP_TAGLINE: ${FRONTEND_TAGLINE:-Keycloak + Kong, JS PDK OIDC plugin}
        ACCENT: ${FRONTEND_ACCENT:-#8b5cf6}
    networks: [sso]

networks:
  sso:
    driver: bridge

volumes:
  postgres_data:
