# lua-resty-session (v3.x) config, read from these $session_* nginx variables.
# Included into Kong's PROXY server block via KONG_NGINX_PROXY_INCLUDE, where the
# kong-oidc plugin's access phase runs. Stores the OIDC session payload in Redis
# (only the session id rides in the cookie) so sessions are shareable/scalable.
set $session_storage redis;
set $session_redis_host redis;
set $session_redis_port 6379;
set $session_redis_prefix oidc;
set $session_redis_uselocking off;

# The session signing/encryption secret. The kong-oidc plugin only overrides
# this var when its `session_secret` config is set (we don't set it), so this
# fixed value is what's used — keeping sessions valid across worker reloads.
set $session_secret demo-kong-oidc-session-secret-change-me;

set $session_cookie_secure off;     # plain http on localhost; flip to on behind TLS
set $session_cookie_httponly on;
set $session_cookie_samesite Lax;   # rides the top-level redirect back from Keycloak
